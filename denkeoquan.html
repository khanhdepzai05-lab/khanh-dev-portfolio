<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bài tập 19 - Đèn Kéo Quân</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#111;
    color:white;
    font-family:Arial, sans-serif;
    text-align:center;
}

h1{
    margin-top:30px;
}

p{
    margin:10px 0 20px;
}

.scene{
    width:300px;
    height:300px;
    margin:100px auto;
    perspective:1200px;
}

.carousel{
    width:100%;
    height:100%;
    position:relative;
    transform-style:preserve-3d;
    animation:spin 10s linear infinite;
}

.carousel:hover{
    animation-play-state:paused;
}

.carousel img{
    position:absolute;
    width:220px;
    height:220px;
    left:40px;
    top:40px;
    object-fit:cover;
    border-radius:12px;
    border:4px solid white;
    box-shadow:0 0 15px rgba(255,255,255,0.4);
}

.face1{
    transform:rotateY(0deg) translateZ(260px);
}

.face2{
    transform:rotateY(60deg) translateZ(260px);
}

.face3{
    transform:rotateY(120deg) translateZ(260px);
}

.face4{
    transform:rotateY(180deg) translateZ(260px);
}

.face5{
    transform:rotateY(240deg) translateZ(260px);
}

.face6{
    transform:rotateY(300deg) translateZ(260px);
}

@keyframes spin{
    from{
        transform:rotateY(0deg);
    }
    to{
        transform:rotateY(360deg);
    }
}

.quiz{
    margin-top:50px;
}

.quiz img{
    width:800px;
    max-width:90%;
    border:4px solid white;
    border-radius:10px;
}

.back-btn{
    display:inline-block;
    margin:30px 0;
    padding:12px 25px;
    background:white;
    color:black;
    text-decoration:none;
    border-radius:8px;
    font-weight:bold;
}

.back-btn:hover{
    transform:scale(1.05);
}

</style>

</head>

<body>

<h1>🎡 Bài tập 19 - Đèn Kéo Quân</h1>

<p>
Di chuột vào đèn để dừng quay.<br>
Rê chuột ra ngoài để quay tiếp.
</p>

<div class="scene">

    <div class="carousel">

        <img src="images/me1.jpg" class="face1">
        <img src="images/me2.jpg" class="face2">
        <img src="images/me3.jpg" class="face3">
        <img src="images/me4.jpg" class="face4">
        <img src="images/me5.jpg" class="face5">
        <img src="images/me6.jpg" class="face6">

    </div>

</div>

<div class="quiz">

    <h2>Kết quả Bài tập 18</h2>
    <br>

    <img src="images/quiz.jpg" alt="Kết quả Quiz">

</div>

<a href="index.html" class="back-btn">
⬅ Quay về Portfolio
</a>

</body>
</html>
